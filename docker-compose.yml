name: imap-to-webhook

services:
  imap_to_webhook:
    build:
      context: .
    container_name: imap-to-webhook
    env_file:
      - ./env/aggregator.env
    volumes:
      - .:/usr/src/app
    restart: unless-stopped
    networks:
      - ai-network
    command: python daemon.py
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ai-network:
    external: true

