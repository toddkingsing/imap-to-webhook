name: imap-to-webhook

services:
  imap_to_webhook:
    build:
      context: .
    container_name: imap-to-webhook
    env_file:
      - .env  # cp .env.example .env
    # volumes:
    #   - .:/usr/src/app  # Uncomment for development only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Uncomment to join an external Docker network:
    # networks:
    #   - ai-network

# Uncomment if using an external network:
# networks:
#   ai-network:
#     external: true
