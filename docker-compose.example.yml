# =============================================================================
# imap-to-webhook Docker Compose example
#
# Quick start:
#   1. cp .env.sample env/aggregator.env   # then edit with your credentials
#   2. cp docker-compose.example.yml docker-compose.yml  # adjust if needed
#   3. docker compose up -d --build
# =============================================================================

name: imap-to-webhook

services:
  imap_to_webhook:
    build:
      context: .
      # For production, use Dockerfile.production instead:
      # dockerfile: Dockerfile.production
    container_name: imap-to-webhook
    env_file:
      - ./env/aggregator.env
    volumes:
      # Mount source code for live-reload during development.
      # Remove this line in production (Dockerfile.production COPYs code into image).
      - .:/usr/src/app
    restart: unless-stopped
    command: python daemon.py
    healthcheck:
      test: ["CMD", "python", "healthcheck.py"]
      interval: 120s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Uncomment to join an external Docker network (e.g. shared with other services):
    # networks:
    #   - my-network

# Uncomment if using an external network:
# networks:
#   my-network:
#     external: true
